<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt - PixelForge</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="kontakt.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <a href="index.html" class="logo">
                    <svg class="logo-icon" width="32" height="32" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15 1H1V7H3.38197L4.88196 4L7.11803 4L10 9.76393L11.382 7H15V1Z"/>
                        <path d="M15 9H12.618L11.118 12L8.88197 12L6 6.23607L4.61803 9H1V15H15V9Z"/>
                    </svg>
                    <span class="logo-text">PixelForge</span>
                </a>
                <input type="checkbox" id="menu-toggle" class="menu-toggle">
                <label for="menu-toggle" class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </label>
                <ul class="nav-menu">
                    <li><a href="index.html">Domů</a></li>
                    <li><a href="o_nas.html">O nás</a></li>
                    <li><a href="projekty.html">Projekty</a></li>
                    <li><a href="kontakt.html" class="active">Kontakt</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <section class="page-hero">
            <div class="container">
                <span class="page-badge">Kontakt</span>
                <h1>Pojďme spolupracovat</h1>
            </div>
        </section>

        <section class="contact-main">
            <div class="container">
                <div class="contact-layout">
                    <div class="contact-info-side">
                        <h2>Kontaktní informace</h2>
                        <div class="contact-list">
                            <div class="contact-entry">
                                <svg class="contact-icon" width="20" height="20"><use href="icons.svg#location-icon"></use></svg>
                                <div>
                                    <strong>Adresa</strong>
                                    <p>Designová 12<br>120 00 Praha 2</p>
                                </div>
                            </div>
                            <div class="contact-entry">
                                <svg class="contact-icon" width="20" height="20"><use href="icons.svg#email-icon"></use></svg>
                                <div>
                                    <strong>Email</strong>
                                    <p>hello@pixelforge.cz</p>
                                </div>
                            </div>
                            <div class="contact-entry">
                                <svg class="contact-icon" width="20" height="20"><use href="icons.svg#phone-icon"></use></svg>
                                <div>
                                    <strong>Telefon</strong>
                                    <p>+420 123 456 789</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="contact-form-side">
                        <h2>Napište nám</h2>
                        <form class="contact-form" action="#" method="post">
                            <div class="form-row">
                                <div class="form-field">
                                    <label for="name">Jméno *</label>
                                    <input type="text" id="name" name="name" required>
                                </div>
                                <div class="form-field">
                                    <label for="email">Email *</label>
                                    <input type="email" id="email" name="email" required>
                                </div>
                            </div>
                            <div class="form-field">
                                <label for="company">Firma</label>
                                <input type="text" id="company" name="company">
                            </div>
                            <div class="form-field">
                                <label for="service">Služba *</label>
                                <select id="service" name="service" required>
                                    <option value="">Vyberte službu</option>
                                    <option value="web">Web Design</option>
                                    <option value="branding">Branding</option>
                                    <option value="uiux">UI/UX Design</option>
                                    <option value="strategy">Digitální strategie</option>
                                    <option value="other">Jiné</option>
                                </select>
                            </div>
                            <div class="form-field">
                                <label for="message">Zpráva *</label>
                                <textarea id="message" name="message" rows="5" required></textarea>
                            </div>
                            <div class="form-checkbox">
                                <input type="checkbox" id="newsletter" name="newsletter">
                                <label for="newsletter">Chci dostávat newsletter s novinkami</label>
                            </div>
                            <button type="submit" class="btn btn-primary">Odeslat</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <div class="footer">
                <p>&copy; 2024 PixelForge. Všechna práva vyhrazena.</p>
                <div class="footer-contact">
                    <span>hello@pixelforge.cz</span>
                    <span>+420 123 456 789</span>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
