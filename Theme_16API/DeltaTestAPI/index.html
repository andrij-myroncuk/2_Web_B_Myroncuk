<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Správa školního systému</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800 p-6 font-sans">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <header class="flex flex-col lg:flex-row justify-between items-center bg-white p-6 rounded-xl shadow-sm border border-slate-200 gap-4">
            <h1 class="text-2xl font-bold text-indigo-700">Delta System</h1>
            
            <div class="flex flex-col md:flex-row gap-4 w-full lg:w-auto">
                <div class="flex gap-2 w-full md:w-auto">
                    <input type="text" id="filter-class" placeholder="Třída (např. 10A)" class="w-full md:w-32 border border-slate-300 rounded-lg p-2 text-sm bg-slate-50 focus:ring-2 focus:ring-indigo-500 outline-none">
                    <button id="btn-filter-class" class="bg-slate-800 hover:bg-slate-900 text-white font-semibold py-2 px-3 rounded-lg text-sm transition-colors whitespace-nowrap">
                        Hledat třídu
                    </button>
                </div>

                <div class="flex gap-2 w-full md:w-auto">
                    <input type="text" id="filter-subject" placeholder="Předmět (javascript)" class="w-full md:w-40 border border-slate-300 rounded-lg p-2 text-sm bg-slate-50 focus:ring-2 focus:ring-indigo-500 outline-none">
                    <button id="btn-filter-subject" class="bg-slate-800 hover:bg-slate-900 text-white font-semibold py-2 px-3 rounded-lg text-sm transition-colors whitespace-nowrap">
                        Hledat předmět
                    </button>
                </div>

                <button id="btn-filter-reset" class="bg-slate-200 hover:bg-slate-300 text-slate-800 font-semibold py-2 px-4 rounded-lg text-sm transition-colors">
                    Všichni
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 h-fit">
                <h2 id="form-title" class="text-xl font-bold mb-4 text-slate-800">Přidat studenta</h2>
                <form id="user-form" class="space-y-4">
                    <input type="hidden" id="user-id">
                    
                    <div>
                        <label class="block text-sm font-semibold mb-1 text-slate-600">Jméno a příjmení</label>
                        <input type="text" id="name" required class="w-full border border-slate-300 bg-slate-50 rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none transition-shadow">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1 text-slate-600">Třída</label>
                        <input type="text" id="classId" required placeholder="Např. 10A" class="w-full border border-slate-300 bg-slate-50 rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none transition-shadow">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1 text-slate-600">Předmět (volitelně)</label>
                        <input type="text" id="subject" placeholder="Např. javascript" class="w-full border border-slate-300 bg-slate-50 rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none transition-shadow">
                    </div>
                    
                    <div class="flex gap-3 pt-2">
                        <button type="submit" id="btn-submit" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 px-4 rounded-lg transition-colors">
                            Vytvořit
                        </button>
                        <button type="button" id="btn-cancel" class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-800 font-bold py-2.5 px-4 rounded-lg hidden transition-colors">
                            Zrušit
                        </button>
                    </div>
                    <div id="form-msg" class="text-sm mt-3 font-medium text-center"></div>
                </form>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-slate-200 md:col-span-2 overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="p-4 font-semibold text-slate-600">Jméno</th>
                            <th class="p-4 font-semibold text-slate-600">Třída / Předmět</th>
                            <th class="p-4 font-semibold text-slate-600">Role</th>
                            <th class="p-4 font-semibold text-slate-600 text-right">Akce</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-100">
                        <tr><td colspan="4" class="p-8 text-center text-slate-500 italic">Načítám data z API...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
