<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>Elementy</title>
    <style>
      table {
        border-collapse: collapse;
      }

      td, th {
        border: 1px solid black;
        text-align: center;
        min-width: 30px;
        height: 20px;
      }
    </style>    
  </head>
  <body>
<table>
  <tr>
    <td colspan="2">vzduch</td>
    <td rowspan="2">Voda</td>
  </tr>
  <tr>
    <td rowspan="2">oheň</td>
    <th><em>člověk</em></th>
  </tr>
  <tr>
    <td colspan="2">země</td>
  </tr>
</table>
  </body>
</html>
